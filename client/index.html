<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="サルベドTCG">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="img/icon-192.png">
<title>サルベド TCG — オンライン対戦</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E6JYMJBJDL"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-E6JYMJBJDL');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=133">
</head>
<body>
<!-- ロビー -->
<div id="lobbyScreen" class="screen active">
<!-- 猫耳SVG定義 -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="lb-ear-l" viewBox="0 0 90 51">
    <path fill="#fffdf8" d="M 13.0 51.0 L 13.0 43.0 Q 14.0 27.9 30.9 12.9 Q 35.0 6.0 41.0 11.3 Q 67.0 27.1 77.0 43.0 L 77.0 51.0 Z"/>
    <path fill="none" stroke="#159aa3" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" d="M 13.0 43.0 Q 14.0 27.9 30.9 12.9 Q 35.0 6.0 41.0 11.3 Q 67.0 27.1 77.0 43.0"/>
  </symbol>
  <symbol id="lb-ear-r" viewBox="0 0 90 51">
    <path fill="#fffdf8" d="M 13.0 51.0 L 13.0 43.0 Q 23.0 27.1 49.0 11.3 Q 55.0 6.0 59.1 12.9 Q 76.0 27.9 77.0 43.0 L 77.0 51.0 Z"/>
    <path fill="none" stroke="#159aa3" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" d="M 13.0 43.0 Q 23.0 27.1 49.0 11.3 Q 55.0 6.0 59.1 12.9 Q 76.0 27.9 77.0 43.0"/>
  </symbol>
</svg>

<!-- 背景の肉球・星 -->
<div class="lb-bg" aria-hidden="true">
  <span class="paw" style="top:9%;left:5%;font-size:64px;">🐾</span>
  <span class="paw" style="top:34%;right:5%;font-size:72px;transform:rotate(18deg);">🐾</span>
  <span class="paw" style="top:62%;left:7%;font-size:60px;transform:rotate(-12deg);">🐾</span>
  <span class="paw" style="top:84%;right:9%;font-size:66px;transform:rotate(10deg);">🐾</span>
  <span class="paw star" style="top:24%;right:16%;font-size:40px;">⭐</span>
  <span class="paw star" style="top:50%;left:14%;font-size:34px;">⭐</span>
  <span class="paw star" style="top:74%;left:6%;font-size:44px;">⭐</span>
</div>

<div class="lb-wrap">
  <img class="lb-logo" src="img/lobby_logo.png" alt="サルベド カードゲーム">

  <div class="lb-chips">
    <a class="lb-chip rules" href="/rules.html">📖 ルールを見る</a>
    <a class="lb-chip cards" href="/cards.html">🃏 カード一覧</a>
  </div>

  <div id="profileSection">
    <div id="profileRegistered" class="lb-profile" style="display:none;">
      <div class="lb-ava"></div>
      <span id="profileGreeting" class="lb-nm"></span>
      <button onclick="showNameEdit()" class="lb-edit">名前変更</button>
    </div>
    <div id="profileNew" class="lb-profile">
      <input id="nameInput" placeholder="名前を入力" class="lb-nameinput">
      <button id="registerBtn" onclick="registerName()" class="lb-register">登録</button>
    </div>
  </div>
  <div id="lobbyStatus" class="lb-status"></div>

  <!-- 対戦 -->
  <div class="lb-panel">
    <svg class="lb-ear l"><use href="#lb-ear-l"/></svg><svg class="lb-ear r"><use href="#lb-ear-r"/></svg>
    <div class="lb-title">⚔️ 対戦</div>
    <div class="lb-btn-row">
      <button class="lb-pop cyan" onclick="quickMatch()"><span class="lb-ic">⚡</span>クイックマッチ</button>
      <button class="lb-pop orange" onclick="aiMatch()"><span class="lb-ic">🤖</span>CPU対戦</button>
    </div>
    <div class="lb-sub-row">
      <button class="lb-sub" onclick="createRoom()">🏠 ルーム作成</button>
      <input id="roomInput" class="lb-roomin" placeholder="ルームID">
      <button class="lb-sub" onclick="joinRoom()">参加</button>
      <button class="lb-sub gold" onclick="openRankModal()">🏆 ランキング</button>
    </div>
  </div>

  <!-- シングル -->
  <div class="lb-panel">
    <svg class="lb-ear l"><use href="#lb-ear-l"/></svg><svg class="lb-ear r"><use href="#lb-ear-r"/></svg>
    <div class="lb-title">🎮 シングル</div>
    <div class="lb-btn-row">
      <button class="lb-pop green" onclick="showQuestSelect()"><span class="lb-ic">🗺️</span>クエストモード</button>
      <button class="lb-pop pink" onclick="tutorialMatch()"><span class="lb-ic">📘</span>チュートリアル</button>
    </div>
  </div>

  <!-- デッキ作成 -->
  <div class="lb-panel lb-panel-wide">
    <svg class="lb-ear l"><use href="#lb-ear-l"/></svg><svg class="lb-ear r"><use href="#lb-ear-r"/></svg>
    <div class="lb-title">🛠️ デッキ作成</div>
    <div class="lb-themelabel">テーマデッキ</div>
<style>
.theme-nav{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.theme-nav a{color:#fff;border-radius:16px;padding:32px 20px;text-decoration:none;font-size:16px;font-weight:900;text-shadow:0 2px 6px rgba(0,0,0,1),0 0 12px rgba(0,0,0,0.8);background-size:cover;background-position:center;border:4px solid #fff;min-width:140px;text-align:center;position:relative;overflow:hidden;transition:transform 0.15s;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 14px rgba(0,0,0,0.14);}
.theme-nav a::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.1) 40%,rgba(0,0,0,0.5) 100%);z-index:0;}
.theme-nav a span{position:relative;z-index:1;}
.theme-nav a:hover{transform:scale(1.05);}
#turnBanner{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);z-index:9999;pointer-events:none;transition:opacity 0.5s;}
#turnBanner.turn-banner-fade{opacity:0;}
.turn-banner-text{font-size:36px;font-weight:bold;color:#f0e6d0;background:linear-gradient(90deg,transparent,rgba(26,26,46,0.95) 15%,rgba(26,26,46,0.95) 85%,transparent);padding:16px 60px;letter-spacing:6px;text-align:center;}
.turn-banner-turn{font-size:14px;color:#c0a860;margin-top:6px;letter-spacing:2px;}
.turn-banner-img{width:min(1512px,96%);height:auto;display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,0.45));transform:translateY(var(--pc-tb-y,0px)) scale(var(--pc-tb-s,1));}
.is-mobile .turn-banner-img{transform:translateY(var(--mob-tb-y,0px)) scale(var(--mob-tb-s,1));}
.is-landscape .turn-banner-img{transform:translateY(var(--land-tb-y,0px)) scale(var(--land-tb-s,1));}
</style>
    <div class="theme-nav">
      <a onclick="applyThemeDeck('lovecome')" style="background-image:url(img/seitokaichou.png);"><span>ラブコメ</span></a>
      <a onclick="applyThemeDeck('fantasy')" style="background-image:url(img/maoria.png);"><span>ファンタジー</span></a>
      <a onclick="applyThemeDeck('creator')" style="background-image:url(img/salvado_cat.png);"><span>クリエイター</span></a>
    </div>
    <div id="deckEditor" style="margin-top:20px;text-align:left;"></div>
  </div>
</div>

<!-- ランキングモーダル -->
<div id="rankModal" class="lb-overlay" style="display:none;" onclick="if(event.target===this)closeRankModal()">
  <div class="lb-rankmodal">
    <svg class="lb-ear l"><use href="#lb-ear-l"/></svg><svg class="lb-ear r"><use href="#lb-ear-r"/></svg>
    <button class="lb-close" onclick="closeRankModal()">×</button>
    <div class="lb-mtitle">🏆 ランキング</div>
    <div class="lb-rankscroll">
    <div class="lb-rtabs">
      <button id="rtabNormal" class="on" onclick="switchRankTab('normal')">⚔️ 通常</button>
      <button id="rtabBoss" onclick="switchRankTab('boss')">👹 ボスラッシュ</button>
    </div>
    <div id="rankNormalWrap">
      <div class="lb-seg" id="segNormal">
        <button onclick="setRankPeriod('rankingPeriod','',this,loadRanking)">全期間</button>
        <button class="on" onclick="setRankPeriod('rankingPeriod','7',this,loadRanking)">週間</button>
        <button onclick="setRankPeriod('rankingPeriod','30',this,loadRanking)">月間</button>
      </div>
      <select id="rankingPeriod" style="display:none;"><option value="">全期間</option><option value="7" selected>週間</option><option value="30">月間</option></select>
      <div id="rankingBody" class="lb-ranklist">読み込み中...</div>
    </div>
    <div id="rankBossWrap" style="display:none;">
      <div class="lb-seg" id="segBoss">
        <button onclick="setRankPeriod('endlessRankingPeriod','',this,loadEndlessRanking)">全期間</button>
        <button class="on" onclick="setRankPeriod('endlessRankingPeriod','7',this,loadEndlessRanking)">週間</button>
        <button onclick="setRankPeriod('endlessRankingPeriod','30',this,loadEndlessRanking)">月間</button>
      </div>
      <select id="endlessRankingPeriod" style="display:none;"><option value="">全期間</option><option value="7" selected>週間</option><option value="30">月間</option></select>
      <div id="endlessRankingBody" class="lb-ranklist">読み込み中...</div>
    </div>
    </div>
  </div>
</div>
</div>

<!-- ターン画面 -->
<div id="turnScreen" class="screen">
<h1 id="turnTitle">運営者1のターン</h1>
<p style="color:#888;margin-bottom:20px;" id="turnMsg">準備ができたらボタンを押してください</p>
<button id="turnBtn" onclick="doStartTurn()">開始</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen" class="screen">
<button id="surrenderBtn" onclick="doSurrender()">降参</button>
<div class="top-bar">
<div class="life-box life-opp"><div class="life-row"><span class="life-label">相手</span><span class="life" id="oppLife">LP:2000</span></div><div class="grave-count" id="oppInfo"></div></div>
<div class="phase-info" id="phaseInfo">フェイズ</div>
<div class="life-box"><div class="life-row"><span class="life-label">自分</span><span class="life" id="myLife">LP:2000</span></div><div class="grave-count" id="myInfo"></div></div>
</div>
<div class="board">
<div class="perspective-wrapper">
<div class="mana-zone" id="oppMana"><span class="label">相手の視聴者</span></div>
<div class="field-row opponent-field" id="oppField"></div>
<div class="board-logo"><img src="img/salvado_icon.png"></div>
<div class="field-row my-field" id="myField"></div>
<div class="mana-zone" id="myMana"><span class="label">視聴者</span></div>
<div class="hand-zone-mobile" id="myHandMobile"></div>
</div>
<div class="hand-zone" id="myHand"><span class="label">手札</span></div>
</div>
<div class="controls" id="controls"></div>
<div class="ctrl-bottom" id="ctrlBottom"><div class="ctrl-arc" id="ctrlArc"></div></div>
</div>

<div id="tutorialGuide" style="display:none;position:fixed;top:36px;left:50%;transform:translateX(-50%);background:#fffdf8;border:3px solid #2fb6cb;border-radius:16px;padding:12px 20px;color:#5a4a32;font-size:13px;font-weight:700;max-width:420px;z-index:1000;text-align:center;line-height:1.6;box-shadow:0 8px 24px rgba(0,0,0,0.35),0 0 0 4px rgba(95,213,227,0.25);cursor:pointer;font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic Pro',sans-serif;" onclick="this.style.display='none'"></div>
<div id="cutinOverlay"></div>
<div id="cardPopup"></div>
<div id="animOverlay"><div id="animBox"></div></div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="toasts"></div>
<div id="log"></div>
<button id="logToggle" onclick="document.getElementById('log').classList.toggle('log-open');this.textContent=document.getElementById('log').classList.contains('log-open')?'ログ閉':'ログ'">ログ</button>

<script>
// バンドル型アプリ(Capacitorネイティブ)ではサーバー依存スクリプトを絶対URLで読む。
// Web/localhostは window.Capacitor が無いので b='' ＝従来通りの相対パス。
(function(){
  var b=(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform())?'https://game.sarubedo.jp':'';
  document.write('<script src="'+b+'/socket.io/socket.io.js"><\/script>');
  document.write('<script src="'+b+'/shared/cards.js?v=1"><\/script>');
})();
</script>
<script src="letterbox.js?v=1"></script>
<script src="client.js?v=105"></script>
<script src="view_switch.js?v=2"></script>
<script src="viewer_topbar.js?v=1"></script>
<script src="opp_hand_display.js?v=2"></script>
<script src="hamburger_menu.js?v=3"></script>
<script>initDeckEditor();if(sessionStorage.getItem('tutorialReplay')){sessionStorage.removeItem('tutorialReplay');tutorialMatch();}</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js?v=2');}</script>
</body>
</html>
