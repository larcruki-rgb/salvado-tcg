<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="サルベドTCG">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="img/icon-192.png">
<title>サルベド TCG — オンライン対戦</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E6JYMJBJDL"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-E6JYMJBJDL');</script>
<link rel="stylesheet" href="style.css?v=14">
</head>
<body>
<!-- ロビー -->
<div id="lobbyScreen" class="screen active">
<div style="text-align:center;padding:40px;">
<div style="margin:0 auto 20px;max-width:600px;"><img src="img/lobby_banner.png" style="width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.5);"></div>
<div style="display:flex;gap:14px;justify-content:center;margin-bottom:24px;"><a href="/rules.html" target="_blank" style="display:inline-block;padding:14px 32px;font-size:17px;font-weight:bold;background:#3a2a50;color:#d0c8f0;border:2px solid #8a7aaa;border-radius:8px;text-decoration:none;cursor:pointer;">ルールを見る</a><a href="/cards.html" target="_blank" style="display:inline-block;padding:14px 32px;font-size:17px;font-weight:bold;background:#2a3a50;color:#c8d0f0;border:2px solid #7a8aaa;border-radius:8px;text-decoration:none;cursor:pointer;">カード一覧を見る</a></div>
<h1 style="color:#f0e6d0;margin-bottom:30px;">サルベド TCG Online</h1>
<div id="profileSection" style="margin-bottom:20px;">
<div id="profileRegistered" style="display:none;">
<span id="profileGreeting" style="color:#f0e6d0;font-size:16px;"></span>
<button onclick="showNameEdit()" style="margin-left:8px;padding:4px 12px;font-size:12px;background:#3a3a50;color:#c0c0c0;border:1px solid #555;border-radius:4px;cursor:pointer;">名前変更</button>
</div>
<div id="profileNew">
<input id="nameInput" placeholder="名前を入力" style="padding:8px 16px;font-size:16px;background:#2c2c3a;color:#f0e6d0;border:1px solid #8a7d5a;border-radius:4px;width:200px;">
<button id="registerBtn" onclick="registerName()" style="margin-left:8px;padding:8px 20px;font-size:15px;background:#5a4a2a;color:#f0e6d0;border:2px solid #8a7d5a;border-radius:6px;cursor:pointer;">登録</button>
</div>
</div>
<div style="max-width:420px;margin:0 auto 20px;border:1px solid #555;border-radius:10px;padding:16px 20px;background:rgba(50,50,70,0.3);">
<div style="color:#f0e6d0;font-size:14px;font-weight:bold;margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid #555;padding-bottom:6px;">対戦</div>
<div style="margin-bottom:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
<button class="lobby-btn" onclick="quickMatch()" style="background:linear-gradient(180deg,#7a6a3a 0%,#5a4a2a 100%);color:#f0e6d0;border-color:#8a7d5a;">クイックマッチ</button>
<button class="lobby-btn" onclick="aiMatch()" style="background:linear-gradient(180deg,#3a6a7a 0%,#2a4a5a 100%);color:#f0e6d0;border-color:#5a8a9a;">CPU対戦</button>
</div>
<div style="margin-bottom:10px;">
<button class="lobby-btn-sm" onclick="createRoom()" style="background:linear-gradient(180deg,#4a4a60 0%,#3a3a50 100%);color:#d0c8b0;border-color:#555;">ルーム作成</button>
</div>
<div style="margin-bottom:10px;display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap;">
<input id="roomInput" placeholder="ルームID" style="padding:6px 12px;font-size:14px;background:#2c2c3a;color:#f0e6d0;border:1px solid #555;border-radius:4px;width:120px;">
<button class="lobby-btn-sm" onclick="joinRoom()" style="background:linear-gradient(180deg,#4a4a60 0%,#3a3a50 100%);color:#d0c8b0;border-color:#555;">参加</button>
</div>
<div style="margin-top:8px;">
<a class="lobby-btn" href="#rankingSection" style="background:linear-gradient(180deg,#6a5a30 0%,#4a3a20 100%);color:#f0d8a0;border-color:#8a7d5a;text-decoration:none;display:inline-block;">ランキング</a>
</div>
</div>
<div style="max-width:420px;margin:0 auto 20px;border:1px solid #555;border-radius:10px;padding:16px 20px;background:rgba(50,50,70,0.3);">
<div style="color:#f0e6d0;font-size:14px;font-weight:bold;margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid #555;padding-bottom:6px;">シングル</div>
<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
<button class="lobby-btn" onclick="showQuestSelect()" style="background:linear-gradient(180deg,#7a4a2a 0%,#5a3a1a 100%);color:#f0d8c0;border-color:#c0a860;letter-spacing:2px;">クエストモード</button>
<button class="lobby-btn" onclick="tutorialMatch()" style="background:linear-gradient(180deg,#3a7a3a 0%,#2a5a2a 100%);color:#d0f0d0;border-color:#5a9a5a;">チュートリアル</button>
</div>
</div>
<div id="lobbyStatus" style="margin-top:20px;color:#aaa;font-size:14px;"></div>
<div style="max-width:520px;margin:20px auto 0;border:1px solid #555;border-radius:10px;padding:16px 20px;background:rgba(50,50,70,0.3);">
<div style="color:#f0e6d0;font-size:14px;font-weight:bold;margin-bottom:12px;letter-spacing:2px;border-bottom:1px solid #555;padding-bottom:6px;">デッキ作成</div>
<div style="border:2px solid #8a7d5a;border-radius:12px;padding:20px;background:rgba(90,74,42,0.15);">
<div style="margin-bottom:14px;color:#f0e6d0;font-size:16px;font-weight:bold;text-align:center;letter-spacing:2px;">テーマデッキ</div>
<style>
.theme-nav{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.theme-nav a{color:#f0e6d0;border-radius:10px;padding:32px 20px;text-decoration:none;font-size:16px;font-weight:bold;text-shadow:0 2px 6px rgba(0,0,0,1),0 0 12px rgba(0,0,0,0.8);background-size:cover;background-position:center;border:2px solid #8a7d5a;min-width:140px;text-align:center;position:relative;overflow:hidden;transition:transform 0.15s,border-color 0.15s;cursor:pointer;letter-spacing:1px;}
.theme-nav a::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:0;}
.theme-nav a span{position:relative;z-index:1;}
.theme-nav a:hover{transform:scale(1.05);border-color:#f0e6d0;}
.theme-nav a:hover::before{background:rgba(0,0,0,0.3);}
</style>
<div class="theme-nav">
<a onclick="applyThemeDeck('lovecome')" style="background-image:url(img/seitokaichou.png);"><span>ラブコメ</span></a>
<a onclick="applyThemeDeck('fantasy')" style="background-image:url(img/maoria.png);"><span>ファンタジー</span></a>
<a onclick="applyThemeDeck('creator')" style="background-image:url(img/salvado_cat.png);"><span>クリエイター</span></a>
</div>
</div>
<div id="deckEditor" style="margin-top:20px;text-align:left;"></div>
</div>
<div id="rankingSection" style="margin-top:24px;max-width:800px;margin-left:auto;margin-right:auto;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
<div style="flex:1;min-width:260px;max-width:380px;border:2px solid #8a7d5a;border-radius:12px;padding:20px;background:rgba(90,74,42,0.15);">
<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:14px;">
<span style="color:#f0e6d0;font-size:16px;font-weight:bold;letter-spacing:2px;">クイックマッチ</span>
<select id="rankingPeriod" onchange="loadRanking()" style="padding:4px 8px;font-size:12px;background:#2c2c3a;color:#f0e6d0;border:1px solid #8a7d5a;border-radius:4px;">
<option value="">全期間</option>
<option value="7" selected>週間</option>
<option value="30">月間</option>
</select>
</div>
<div id="rankingBody" style="color:#aaa;font-size:13px;text-align:center;">読み込み中...</div>
</div>
<div style="flex:1;min-width:260px;max-width:380px;border:2px solid #8a2a4a;border-radius:12px;padding:20px;background:rgba(90,42,42,0.15);">
<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:14px;">
<span style="color:#ff8888;font-size:16px;font-weight:bold;letter-spacing:2px;">∞ 無限ボスラッシュ</span>
<select id="endlessRankingPeriod" onchange="loadEndlessRanking()" style="padding:4px 8px;font-size:12px;background:#2c2c3a;color:#f0e6d0;border:1px solid #8a2a4a;border-radius:4px;">
<option value="">全期間</option>
<option value="7" selected>週間</option>
<option value="30">月間</option>
</select>
</div>
<div id="endlessRankingBody" style="color:#aaa;font-size:13px;text-align:center;">読み込み中...</div>
</div>
</div>
</div>
</div>

<!-- ターン画面 -->
<div id="turnScreen" class="screen">
<h1 id="turnTitle">運営者1のターン</h1>
<p style="color:#888;margin-bottom:20px;" id="turnMsg">準備ができたらボタンを押してください</p>
<button id="turnBtn" onclick="doStartTurn()">開始</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen" class="screen">
<div class="top-bar">
<div class="life-box life-opp"><div class="life-row"><span class="life-label">相手</span><span class="life" id="oppLife">LP:2000</span></div><div class="grave-count" id="oppInfo"></div></div>
<div class="phase-info" id="phaseInfo">フェイズ</div>
<div class="life-box"><div class="life-row"><span class="life-label">自分</span><span class="life" id="myLife">LP:2000</span></div><div class="grave-count" id="myInfo"></div></div>
</div>
<div class="board">
<div class="perspective-wrapper">
<div class="mana-zone" id="oppMana"><span class="label">相手の視聴者</span></div>
<div class="field-row opponent-field" id="oppField"></div>
<div class="board-logo"><img src="img/salvado_icon.png"></div>
<div class="field-row my-field" id="myField"></div>
<div class="mana-zone" id="myMana"><span class="label">視聴者</span></div>
<div class="hand-zone-mobile" id="myHandMobile"></div>
</div>
<div class="hand-zone" id="myHand"><span class="label">手札</span></div>
</div>
<div class="controls" id="controls"></div>
<div class="ctrl-bottom" id="ctrlBottom"><div class="ctrl-arc" id="ctrlArc"></div></div>
</div>

<div id="tutorialGuide" style="display:none;position:fixed;top:36px;left:50%;transform:translateX(-50%);background:rgba(0,60,0,0.95);border:2px solid #5a9a5a;border-radius:10px;padding:10px 18px;color:#d0f0d0;font-size:13px;max-width:420px;z-index:1000;text-align:center;line-height:1.5;box-shadow:0 4px 20px rgba(0,0,0,0.5);cursor:pointer;" onclick="this.style.display='none'"></div>
<div id="cutinOverlay"></div>
<div id="cardPopup"></div>
<div id="animOverlay"><div id="animBox"></div></div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="toasts"></div>
<div id="log"></div>
<button id="logToggle" onclick="document.getElementById('log').classList.toggle('log-open');this.textContent=document.getElementById('log').classList.contains('log-open')?'ログ閉':'ログ'">ログ</button>

<script src="/socket.io/socket.io.js"></script>
<script src="/shared/cards.js?v=1"></script>
<script src="client.js?v=6"></script>
<script>initDeckEditor();if(sessionStorage.getItem('tutorialReplay')){sessionStorage.removeItem('tutorialReplay');tutorialMatch();}</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js?v=2');}</script>
</body>
</html>
